# Builds the commit/tag attached to the GitHub Release. Re-running an old release
name: Publish to PyPI and npm

on:
  release:
    types: [published]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Package version from pyproject.toml
        run: grep -E '^version\s*=' pyproject.toml

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build package
        run: uv build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: release
      url: https://pypi.org/project/slopsniff/

    permissions:
      id-token: write # required for OIDC trusted publishing

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      # PyPI returns 400 if these exact filenames already exist (same version re-published).
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true

  publish-npm:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # required for npm trusted publishing OIDC

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Sync npm package version from pyproject.toml
        run: |
          python3 - <<'PY'
          import json
          import pathlib
          import re

          pyproject = pathlib.Path("pyproject.toml").read_text(encoding="utf-8")
          m = re.search(r'^version\s*=\s*"([^"]+)"', pyproject, re.MULTILINE)
          if not m:
              raise SystemExit("Could not find version in pyproject.toml")
          version = m.group(1)

          package_path = pathlib.Path("npm/package.json")
          package = json.loads(package_path.read_text(encoding="utf-8"))
          package["version"] = version
          package_path.write_text(json.dumps(package, indent=2) + "\n", encoding="utf-8")
          print(f"Set npm package version to {version}")
          PY

      - name: Publish to npm
        working-directory: npm
        run: npm publish --access public --provenance
